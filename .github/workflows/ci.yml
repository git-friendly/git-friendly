name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: tests only read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up test repos
        run: |
          # Put the git-friendly scripts on PATH for every later step.
          echo "$GITHUB_WORKSPACE" >> "$GITHUB_PATH"
          git config --global user.email "test@test.com"
          git config --global user.name "Test"
          git config --global init.defaultBranch main

          # Create a bare repo to act as "remote"
          git init --bare /tmp/remote-repo.git

          # Clone it as our working repo
          git clone /tmp/remote-repo.git /tmp/test-repo
          cd /tmp/test-repo
          echo "hello" > file.txt
          git add file.txt
          git commit -m "Initial commit"
          git push origin main

      - name: Test - outside git repo fails gracefully
        run: |
          cd /tmp
          ! branch 2>/dev/null
          ! pull 2>/dev/null
          ! push 2>/dev/null
          ! stash 2>/dev/null

      - name: Test branch - list
        run: |
          cd /tmp/test-repo
          branch

      - name: Test branch - create and switch
        run: |
          cd /tmp/test-repo
          branch test-feature
          [ "$(git branch --show-current)" = "test-feature" ]

      - name: Test branch - switch to existing
        run: |
          cd /tmp/test-repo
          branch main
          [ "$(git branch --show-current)" = "main" ]

      - name: Test branch - switch to previous
        run: |
          cd /tmp/test-repo
          branch -
          [ "$(git branch --show-current)" = "test-feature" ]

      - name: Test branch - track remote branch
        run: |
          cd /tmp/test-repo
          git push origin test-feature
          branch main
          # Delete local, then re-create from remote
          git branch -d test-feature
          branch test-feature
          # Should be tracking the remote now
          git config branch.test-feature.remote | grep -q origin

      - name: Test branch -r
        run: |
          cd /tmp/test-repo
          branch -r | grep -q origin

      - name: Test branch -d and -D
        run: |
          cd /tmp/test-repo
          branch main

          # -d: delete a fully merged branch
          branch -d test-feature

          # -D: force delete an unmerged branch
          branch unmerged-work
          echo "wip" > wip.txt
          git add wip.txt
          git commit -m "Unmerged work"
          branch main
          branch -D unmerged-work

          # Verify both are gone
          ! git branch --list test-feature | grep -q test-feature
          ! git branch --list unmerged-work | grep -q unmerged-work

      - name: Test stash - untracked files
        run: |
          cd /tmp/test-repo
          echo "uncommitted" > newfile.txt
          stash
          [ ! -f newfile.txt ]
          stash pop
          [ -f newfile.txt ]
          rm newfile.txt

      - name: Test stash - passthrough arguments
        run: |
          cd /tmp/test-repo
          echo "changed" >> file.txt
          stash push -m "my stash message"
          stash list | grep -q "my stash message"
          stash pop
          # leave a clean working tree so later tests can rely on it
          git checkout -- file.txt

      - name: Test pull - basic
        run: |
          cd /tmp/test-repo
          git checkout main

          # Push a commit to the remote from a second clone
          git clone /tmp/remote-repo.git /tmp/other-clone
          cd /tmp/other-clone
          echo "remote change" > remote.txt
          git add remote.txt
          git commit -m "Remote change"
          git push origin main

          # Pull should fetch it
          cd /tmp/test-repo
          pull
          [ -f remote.txt ]

      - name: Test pull - stashes dirty working tree
        run: |
          # Make another remote change
          cd /tmp/other-clone
          echo "another" >> remote.txt
          git add remote.txt
          git commit -m "Another remote change"
          git push origin main

          # Pull with local uncommitted changes
          cd /tmp/test-repo
          echo "local wip" > local.txt
          pull
          [ -f local.txt ]
          rm local.txt

      - name: Test pull - no-rebase flag
        run: |
          cd /tmp/other-clone
          echo "yet another" >> remote.txt
          git add remote.txt
          git commit -m "Yet another"
          git push origin main

          cd /tmp/test-repo
          GIT_FRIENDLY_NO_REBASE_ON_PULL=true pull

      - name: Test push - basic
        run: |
          cd /tmp/test-repo
          echo "push test" > pushed.txt
          git add pushed.txt
          git commit -m "Push test"
          push

          # Verify it arrived at the remote
          cd /tmp/other-clone
          git pull origin main
          [ -f pushed.txt ]

      - name: Test push - new branch
        run: |
          cd /tmp/test-repo
          branch push-branch
          echo "new branch content" > branch-file.txt
          git add branch-file.txt
          git commit -m "New branch push"
          push

          # Verify remote has the branch
          git -C /tmp/remote-repo.git branch | grep -q push-branch

      - name: Test push - everything up-to-date
        run: |
          cd /tmp/test-repo
          push 2>&1 | grep -q "up-to-date"

      - name: Test merge
        run: |
          cd /tmp/test-repo
          branch main
          branch merge-me
          echo "merge content" > merge.txt
          git add merge.txt
          git commit -m "Add merge content"
          branch main
          merge merge-me
          [ -f merge.txt ]
          branch -d merge-me

      - name: Test branch - nonexistent delete propagates failure
        run: |
          cd /tmp/test-repo
          # `branch -d` on a nonexistent branch must exit non-zero
          ! branch -d definitely-no-such-branch 2>/dev/null

      - name: Test branch - name with slash
        run: |
          cd /tmp/test-repo
          branch feature/has-slash
          [ "$(git branch --show-current)" = "feature/has-slash" ]
          branch main
          git branch -D feature/has-slash

      - name: Test detached HEAD - pull/push/merge fail cleanly
        run: |
          cd /tmp/test-repo
          git checkout main
          git checkout --detach HEAD
          ! pull 2>/dev/null
          ! push 2>/dev/null
          ! merge main 2>/dev/null
          git checkout main

      - name: Test pull - skips pop when nothing was stashed
        run: |
          cd /tmp/other-clone
          echo "pop test" >> remote.txt
          git add remote.txt
          git commit -m "Pop test change"
          git push origin main

          cd /tmp/test-repo
          # Clean working tree — pull must not run `git stash pop`
          out=$(pull 2>&1)
          echo "$out" | grep -q "Popping stash" && exit 1
          echo "$out" | grep -q "🦄  Done"

      - name: Test pull - pop runs exactly once when something was stashed
        run: |
          cd /tmp/other-clone
          echo "another pop" >> remote.txt
          git add remote.txt
          git commit -m "Another pop"
          git push origin main

          cd /tmp/test-repo
          echo "untracked wip" > pop-wip.txt
          out=$(pull 2>&1)
          pops=$(echo "$out" | grep -c "Popping stash")
          [ "$pops" = "1" ]
          [ -f pop-wip.txt ]
          rm -f pop-wip.txt

      - name: Test pull - has_changed only fires install hooks on actual change
        run: |
          # Add a yarn.lock + package.json on the remote — first pull should set up the repo
          cd /tmp/other-clone
          echo '{}' > package.json
          : > yarn.lock
          git add package.json yarn.lock
          git commit -m "Add JS lockfile"
          git push origin main

          cd /tmp/test-repo
          pull >/dev/null 2>&1

          # Push an unrelated change; pull must NOT re-run yarn install
          cd /tmp/other-clone
          echo "unrelated" > unrelated.txt
          git add unrelated.txt
          git commit -m "Unrelated change"
          git push origin main

          cd /tmp/test-repo
          out=$(pull 2>&1)
          echo "$out" | grep -q "Installing packages with yarn" && {
            echo "BUG: yarn install fired without lockfile change"
            exit 1
          }
          true

      - name: Test push - passthrough flag (--force-with-lease)
        run: |
          cd /tmp/test-repo
          echo "force test" > force.txt
          git add force.txt
          git commit -m "Force test"
          push --force-with-lease

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # shellcheck ships preinstalled on the ubuntu-latest runner image.
      - name: Run shellcheck
        run: shellcheck -S warning branch merge pull push stash install.sh
